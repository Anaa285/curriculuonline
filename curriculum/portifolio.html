<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Portifolio</title>

    <style>
    :root {
        --rosa-principal: #f8b6c8;
        --rosa-claro: #fde2e7;
        --rosa-escuro: #e89ab0;
        --rosa-footer: #d98ca3;
    }

    body {
        background-color: #fff7f9;
    }

    /* Navbar */
    .navbar {
        background-color: var(--rosa-claro) !important;
    }

    .navbar-brand,
    .nav-link {
        color: #8d4f66 !important;
    }

    .nav-link:hover {
        color: var(--rosa-escuro) !important;
    }

    /* Botões principais */
    .btn-primary {
        background-color: var(--rosa-principal);
        border-color: var(--rosa-principal);
        color: #6e3d4e;
    }

    .btn-primary:hover {
        background-color: var(--rosa-escuro);
        border-color: var(--rosa-escuro);
        color: white;
    }

    /* Botão secundário */
    .btn-secondary {
        background-color: #f4d6df;
        border-color: #f4d6df;
        color: #8d4f66;
    }

    .btn-secondary:hover {
        background-color: #ecc2d0;
        border-color: #ecc2d0;
    }

    /* Botão "Sobre Mim" */
    .btn-danger {
        background-color: #f5a9bc;
        border-color: #f5a9bc;
    }

    .btn-danger:hover {
        background-color: #ea8faa;
        border-color: #ea8faa;
    }

    /* Cards */
    .card {
        border: none;
        background-color: #fffafb;
    }

    /* Accordion */
    .accordion-button:not(.collapsed) {
        background-color: #fde2e7;
        color: #8d4f66;
    }

    .accordion-button:focus {
        box-shadow: none;
        border-color: transparent;
    }

    /* Footer */
    footer {
        background-color: var(--rosa-footer) !important;
    }

    footer .btn {
        border-color: white;
        color: white;
    }

    footer .btn:hover {
        background-color: white;
        color: var(--rosa-footer);
    }

    footer i:hover {
        color: #fff0f5;
        transform: scale(1.1);
        transition: 0.3s;
    }
</style>
</head>
<body>
    <div class="container text-center mt-5">
    <h1 class="text-primary fw-bold">
        Portfólio
    </h1>
</div>
<div class="text-center mt-4">

    <a href="index.html"
       class="btn btn-outline-primary btn-lg">
        VOLTAR
    </a>

</div>
    <div class="container mt-4">

    <div id="carouselPortfolio"
         class="carousel slide shadow-lg"
         data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button"
                    data-bs-target="#carouselPortfolio"
                    data-bs-slide-to="0"
                    class="active">
            </button>

            <button type="button"
                    data-bs-target="#carouselPortfolio"
                    data-bs-slide-to="1">
            </button>

            <button type="button"
                    data-bs-target="#carouselPortfolio"
                    data-bs-slide-to="2">
            </button>
        </div>

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="BAIXACOMPLEXIDADE (1).png"
                     class="d-block w-100 rounded"
                     alt="Imagem 1">
            </div>

            <div class="carousel-item">
                <img src="BAIXACOMPLEXIDADE.png"
                     class="d-block w-100 rounded"
                     alt="Imagem 2">
            </div>

            <div class="carousel-item">
                <img src="BAIXACOMPLEXIDADE1.png"
                     class="d-block w-100 rounded"
                     alt="Imagem 3">
            </div>

            <div class="carousel-item">
                <img src="CasodeUso1-Página-2.drawio.png"
                     class="d-block w-100 rounded"
                     alt="Imagem 4">
            </div>


            <div class="carousel-item">
                <img src="mediacomplexidade.png"
                     class="d-block w-100 rounded"
                     alt="Imagem 5">
            </div>

            <div class="carousel-item">
                <img src="Captura de Tela 2026-04-16 às 09.09.58.png"
                     class="d-block w-100 rounded"
                     alt="Imagem 6">
            </div>


            <div class="carousel-item">
                <img src="Captura de Tela 2026-04-16 às 09.10.16.png"
                     class="d-block w-100 rounded"
                     alt="Imagem 7">
            </div>



        </div>

        <button class="carousel- control-prev"
                type="button"
                data-bs-target="#carouselPortfolio"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#carouselPortfolio"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

</div>
</body>
</html>
